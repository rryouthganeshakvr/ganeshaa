<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="50%"  stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FF9F3A"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E8640A"/>
    </linearGradient>
    <!-- Glow for the Om -->
    <filter id="omGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for the outer ring -->
    <filter id="ringGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── OUTER RINGS ── -->
  <circle cx="100" cy="100" r="96" stroke="url(#gold)" stroke-width="1.6" opacity="0.95" filter="url(#ringGlow)"/>
  <circle cx="100" cy="100" r="90" stroke="#D4AF37"    stroke-width="0.5" opacity="0.35"/>

  <!-- ── CARDINAL TICK MARKS (4) ── -->
  <!-- Top -->
  <line x1="100" y1="4"   x2="100" y2="15"  stroke="#FFD700" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Right -->
  <line x1="196" y1="100" x2="185" y2="100" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Bottom -->
  <line x1="100" y1="196" x2="100" y2="185" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Left -->
  <line x1="4"   y1="100" x2="15"  y2="100" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>

  <!-- ── DIAGONAL TICK MARKS (4, at 45°) ── -->
  <!-- 315° top-right: outer(168,32)→inner(162,38) -->
  <line x1="168" y1="32"  x2="162" y2="38"  stroke="#D4AF37" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
  <!-- 45° bottom-right: outer(168,168)→inner(162,162) -->
  <line x1="168" y1="168" x2="162" y2="162" stroke="#D4AF37" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
  <!-- 135° bottom-left: outer(32,168)→inner(38,162) -->
  <line x1="32"  y1="168" x2="38"  y2="162" stroke="#D4AF37" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>
  <!-- 225° top-left: outer(32,32)→inner(38,38) -->
  <line x1="32"  y1="32"  x2="38"  y2="38"  stroke="#D4AF37" stroke-width="1.3" stroke-linecap="round" opacity="0.75"/>

  <!-- ── DOTS at 22.5° INTER-POSITIONS (8) ── -->
  <!-- 22.5°  → (186,136) -->
  <circle cx="186" cy="136" r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 67.5°  → (136,186) -->
  <circle cx="136" cy="186" r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 112.5° → (64,186) -->
  <circle cx="64"  cy="186" r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 157.5° → (14,136) -->
  <circle cx="14"  cy="136" r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 202.5° → (14,64) -->
  <circle cx="14"  cy="64"  r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 247.5° → (64,14) -->
  <circle cx="64"  cy="14"  r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 292.5° → (136,14) -->
  <circle cx="136" cy="14"  r="1.4" fill="#D4AF37" opacity="0.6"/>
  <!-- 337.5° → (186,64) -->
  <circle cx="186" cy="64"  r="1.4" fill="#D4AF37" opacity="0.6"/>

  <!-- ── MANDALA PETAL RING (8 circles at r=52 from center, each r=22) ── -->
  <!-- 0°   → (152,100) -->
  <circle cx="152" cy="100" r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 45°  → (137,137) -->
  <circle cx="137" cy="137" r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 90°  → (100,152) -->
  <circle cx="100" cy="152" r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 135° → (63,137) -->
  <circle cx="63"  cy="137" r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 180° → (48,100) -->
  <circle cx="48"  cy="100" r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 225° → (63,63) -->
  <circle cx="63"  cy="63"  r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 270° → (100,48) -->
  <circle cx="100" cy="48"  r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>
  <!-- 315° → (137,63) -->
  <circle cx="137" cy="63"  r="22" stroke="url(#gold)" stroke-width="0.65" opacity="0.3"/>

  <!-- ── INNER CIRCLE ── -->
  <circle cx="100" cy="100" r="34" stroke="url(#gold)" stroke-width="0.8" opacity="0.28"/>

  <!-- ── OM SYMBOL ── -->
  <text
    x="100"
    y="116"
    font-size="62"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="serif"
    fill="url(#goldV)"
    filter="url(#omGlow)"
  >ॐ</text>
</svg>
